<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Routine Tracker</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
  body { background: #f8f9fa; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .card { border: none; border-radius: 16px; box-shadow: 0 2px 16px rgba(0,0,0,0.08); }
  .btn-primary { background: #4f46e5; border-color: #4f46e5; }
  .btn-primary:hover { background: #3730a3; border-color: #3730a3; }
</style>
</head>
<body>
<div class="card p-4" style="width: 100%; max-width: 400px;">
  <div class="text-center mb-4">
    <h1 class="h4 fw-bold" style="color: #4f46e5;">Routine Tracker</h1>
    <p class="text-muted small">Sign in to your account</p>
  </div>
  {% if error %}
  <div class="alert alert-danger py-2 small">{{ error }}</div>
  {% endif %}
  <form method="POST">
    <div class="mb-3">
      <label class="form-label small fw-medium">Email</label>
      <input type="email" name="email" class="form-control" placeholder="you@example.com" required>
    </div>
    <div class="mb-3">
      <label class="form-label small fw-medium">Password</label>
      <input type="password" name="password" class="form-control" placeholder="Your password" required>
    </div>
    <button type="submit" class="btn btn-primary w-100">Sign In</button>
  </form>
  <p class="text-center mt-3 mb-0 small text-muted">No account? <a href="/register" class="text-decoration-none" style="color:#4f46e5;">Register here</a></p>
</div>
</body>
</html>
