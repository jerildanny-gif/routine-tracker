<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<div class="container mt-5">
<h2>Routine Tracker</h2>

<a href="/logout" class="btn btn-danger">Logout</a>

<h4>Total: {{total}} | Done: {{done}}</h4>

<form method="POST" action="/add">
<input class="form-control" name="name" placeholder="Task"><br>
<input class="form-control" type="time" name="time"><br>
<button class="btn btn-success">Add Task</button>
</form>

<ul class="list-group mt-3">
{% for t in tasks %}
<li class="list-group-item">
{{t[1]}} - {{t[4]}} - {{t[3]}}
<a href="/toggle/{{t[0]}}" class="btn btn-warning btn-sm">Toggle</a>
<a href="/delete/{{t[0]}}" class="btn btn-danger btn-sm">Delete</a>
</li>
{% endfor %}
</ul>
</div>
